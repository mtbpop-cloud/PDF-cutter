<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        rel="stylesheet">
    <style>
        .terms-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        .terms-header {
            text-align: center;
            padding: 2rem 0 1rem;
        }

        .terms-header .logo {
            width: 52px;
            height: 52px;
            margin: 0 auto 1rem;
        }

        .terms-header .logo svg {
            width: 26px;
            height: 26px;
        }

        .terms-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .terms-header .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            margin-top: 1rem;
            color: var(--color-accent);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color var(--transition-fast);
        }

        .terms-header .back-link:hover {
            color: var(--color-primary);
        }

        .terms-header .back-link svg {
            width: 16px;
            height: 16px;
        }

        .terms-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
        }

        .tokushoho-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9375rem;
        }

        .tokushoho-table th {
            width: 30%;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            background: rgba(var(--color-primary-rgb), 0.05);
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text);
        }

        .tokushoho-table td {
            width: 70%;
            padding: 1rem;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text);
            line-height: 1.6;
        }

        .tokushoho-table tr:last-child th,
        .tokushoho-table tr:last-child td {
            border-bottom: none;
        }

        .notice-text {
            font-size: 0.875rem;
            color: var(--color-text-subtle);
            background: rgba(255, 160, 0, 0.05);
            border-left: 4px solid var(--color-accent);
            padding: 1rem;
            margin-top: 1.5rem;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            line-height: 1.6;
        }

        @media (max-width: 640px) {
            .terms-header h1 {
                font-size: 1.5rem;
            }

            .terms-card {
                padding: 1.5rem 1.25rem;
            }

            .tokushoho-table th,
            .tokushoho-table td {
                display: block;
                width: 100%;
            }

            .tokushoho-table th {
                border-bottom: none;
                padding-bottom: 0.5rem;
            }

            .tokushoho-table td {
                padding-top: 0;
                padding-bottom: 1.5rem;
            }
        }
    </style>
